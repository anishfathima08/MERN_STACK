<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row" id="ProductList">
            
        </div>

        <br><br>

       <h3>Your Cart</h3>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody id="cartList">

            </tbody>
        </table>

    </div>

    <script>
        var products = [
            { id: 1, name: "Product 1", price: 100 },
            { id: 2, name: "Product 2", price: 200 },
            { id: 3, name: "Product 3", price: 300 },
            { id: 4, name: "Product 4", price: 400 },
        ];

        function display_product(){
            var display_product = '';
            products.forEach((a) => {
                display_product += `
                    <div class="col-lg-3">
                        <div class="card">
                            <div class="card-body">
                                <h4>${a.name}</h4>
                                <p>${a.price}</p>
                                <button>Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `
            })
            document.getElementById('ProductList').innerHTML = display_product
        }
        display_product()

    </script>
</body>
</html>
